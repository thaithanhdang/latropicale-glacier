<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bons de Commande — La Tropicale Glacier</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--vert:#1e3a2f;--vert-clair:#2d5442;--beige:#f5f0e8;--beige-f:#e8dfc8;--or:#c9a84c;--blanc:#fdfaf4;--texte:#1a2e24;--gris:#6b7c74;--r:10px;--sh:0 2px 16px rgba(30,58,47,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--beige);color:var(--texte);min-height:100vh}
header{background:var(--vert);color:var(--blanc);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hbrand{display:flex;align-items:center;gap:12px}
.hbrand .logo{width:38px;height:38px;background:var(--or);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.hbrand h1{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.hbrand p{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hback{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;text-decoration:none}
main{max-width:980px;margin:0 auto;padding:24px 16px 60px}
.card{background:var(--blanc);border-radius:var(--r);box-shadow:var(--sh);padding:22px 26px;margin-bottom:20px;border:1px solid var(--beige-f)}
.card h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px;color:var(--vert);display:flex;align-items:center;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.g2{grid-template-columns:1fr}}
label{display:block;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--gris);margin-bottom:5px}
input[type=text],input[type=password],select{width:100%;padding:9px 12px;border:1.5px solid var(--beige-f);border-radius:7px;background:var(--beige);font-family:'DM Mono',monospace;font-size:12px;color:var(--texte);outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--vert-clair);background:#fff}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-p{background:var(--vert);color:#fff}.btn-p:hover{background:var(--vert-clair)}
.btn-s{background:var(--beige-f);color:var(--texte)}.btn-s:hover{background:#ddd5bb}
.btn-o{background:var(--or);color:#fff}.btn-o:hover{background:#b8943e}
.btn-sm{padding:6px 12px;font-size:12px}
.sb{display:none;align-items:center;gap:10px;padding:10px 14px;border-radius:7px;font-size:13px;margin-top:12px}
.sb.show{display:flex}
.sb-l{background:#e8f0fe;color:#1a56db;border:1px solid #c3d7fb}
.sb-ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.sb-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.spin{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.mc{display:none}.mc.show{display:block}
.mt{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.mt th{text-align:left;padding:8px 11px;background:var(--vert);color:rgba(255,255,255,.85);font-size:10px;letter-spacing:1px;text-transform:uppercase}
.mt th:first-child{border-radius:7px 0 0 0}.mt th:last-child{border-radius:0 7px 0 0}
.mt td{padding:8px 11px;border-bottom:1px solid var(--beige-f);vertical-align:middle}
.mt tr:last-child td{border-bottom:none}.mt tr:nth-child(even) td{background:var(--beige)}
.mt select{padding:4px 7px;font-size:12px;border-radius:5px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.bj-lundi{background:#dbeafe;color:#1e40af}.bj-mardi{background:#dcfce7;color:#166534}
.bj-mercredi{background:#fef9c3;color:#854d0e}.bj-jeudi{background:#fce7f3;color:#9d174d}
.bj-vendredi{background:#ede9fe;color:#5b21b6}.bj-samedi{background:#ffedd5;color:#c2410c}
.bj-dimanche{background:#f1f5f9;color:#475569}
.b-ok{background:#ecfdf5;color:#065f46}.b-err{background:#fef2f2;color:#991b1b}
.cs{display:none;margin-top:24px}.cs.show{display:block}
.stitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--vert);margin-bottom:4px}
.ssub{color:var(--gris);font-size:13px;margin-bottom:20px}
.tnav{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tbtn{padding:8px 16px;border-radius:6px;border:1.5px solid var(--beige-f);background:var(--blanc);font-size:13px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.tbtn.active{background:var(--vert);color:#fff;border-color:var(--vert)}
.tbtn:hover:not(.active){border-color:var(--vert)}
.tpanel{display:none}.tpanel.active{display:block}
.bc{background:var(--blanc);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:18px;border:1px solid var(--beige-f);overflow:hidden}
.bch{background:var(--vert);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.bch .fn{font-family:'Playfair Display',serif;font-size:16px;font-weight:600}
.bch .fc{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.bch .ji{text-align:right;font-size:11px;color:rgba(255,255,255,.7);line-height:1.7}
.bch .ji strong{color:var(--or)}
.btab{width:100%;border-collapse:collapse;font-size:13px}
.btab th{text-align:left;padding:9px 16px;background:var(--beige);color:var(--gris);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--beige-f)}
.btab td{padding:10px 16px;border-bottom:1px solid var(--beige-f);vertical-align:top}
.btab tr:last-child td{border-bottom:none}.btab tr:hover td{background:var(--beige)}
.qte{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--vert-clair);white-space:nowrap}
.tr{display:inline-block;padding:1px 6px;background:var(--beige-f);border-radius:4px;font-size:10px;margin:1px 2px 1px 0}
.bf{padding:10px 16px;background:var(--beige);border-top:1px solid var(--beige-f);display:flex;justify-content:flex-end;gap:8px}
.ec{background:var(--blanc);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:18px;border:1px solid var(--beige-f);overflow:hidden}
.ech{background:#2d5442;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.ech .et{font-family:'Playfair Display',serif;font-size:15px;font-weight:600}
.ef{padding:14px 20px;border-bottom:1px solid var(--beige-f)}
.efl{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:13px}
.efl label{min-width:58px;color:var(--gris);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding-top:2px;font-weight:500;margin-bottom:0}
.efl .v{flex:1}
.eb{padding:14px 20px}
.eb textarea{width:100%;min-height:180px;border:1.5px solid var(--beige-f);border-radius:7px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.6;resize:vertical;background:var(--beige);color:var(--texte)}
.eb textarea:focus{outline:none;border-color:var(--vert-clair);background:#fff}
.ef2{padding:10px 16px;background:var(--beige);border-top:1px solid var(--beige-f);display:flex;gap:8px;justify-content:flex-end}
.pr{background:var(--blanc);border-radius:var(--r);box-shadow:var(--sh);padding:18px 22px;margin-bottom:20px;border:1px solid var(--beige-f)}
.pr h3{font-family:'Playfair Display',serif;font-size:14px;margin-bottom:12px;color:var(--vert)}
.pj{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.pj .jl{width:80px;flex-shrink:0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gris);padding-top:3px}
.tp{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:5px;font-size:11px;background:var(--beige-f);margin:2px}
.tp.ok{background:#dcfce7;color:#166534}.tp.nok{background:#fee2e2;color:#991b1b}
.abar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
#toast{position:fixed;bottom:20px;right:20px;background:var(--vert);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(60px);opacity:0;transition:all .3s;z-index:999}
#toast.show{transform:translateY(0);opacity:1}
@media print{header,.card,.mc,.abar,.bf,.ef2,.tnav{display:none!important}.cs{display:block!important}.tpanel{display:block!important}body{background:white}.bc{page-break-inside:avoid;box-shadow:none;border:1px solid #ddd}.bch{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>

<header>
  <div class="hbrand">
    <div class="logo">🍦</div>
    <div>
      <h1>La Tropicale Glacier</h1>
      <p>Bons de commande</p>
    </div>
  </div>
  <a href="https://latropicale-glacier.vercel.app" class="hback">← Retour à l'app</a>
</header>

<main>

<div class="card">
  <h2>⚙️ Configuration</h2>
  <div class="g2">
    <div><label>URL Supabase</label><input type="text" id="supabaseUrl" value="https://bedunhjdbfxguvtzxdha.supabase.co"></div>
    <div><label>Clé anon (Publishable key)</label><input type="password" id="supabaseKey" value="sb_publishable_1fY44lTPE5ArvGQBm3pHRQ_NyDcBuSO"></div>
  </div>
  <div style="margin-top:12px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
    <div style="flex:1;min-width:220px;">
      <label>Semaine à charger</label>
      <select id="semaineSelect" onchange="toggleGidManuel()"><option value="">— chargement… —</option></select>
    </div>
    <button class="btn btn-p" onclick="lancerChargement()">🔄 Charger le planning</button>
    <label style="display:flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;font-size:13px;cursor:pointer;color:var(--texte);margin-bottom:0;">
      <input type="checkbox" id="saveConfig"> Mémoriser
    </label>
  </div>
  <div id="gidManuelDiv" style="display:none;margin-top:10px;padding:12px 14px;background:var(--beige);border-radius:7px;border:1px solid var(--beige-f);">
    <label style="margin-bottom:6px;">GID de l'onglet <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--gris);">— ouvre le sheet, clique sur l'onglet voulu, copie le numéro après <strong>#gid=</strong> dans l'URL</span></label>
    <input type="text" id="gidManuel" placeholder="ex: 1166307452" style="width:200px;">
  </div>
  <div class="sb" id="statusBar"></div>
</div>

<div class="card mc" id="mappingCard">
  <h2>🗺️ Correspondance parfums ↔ recettes</h2>
  <p style="font-size:13px;color:var(--gris);margin-bottom:12px;">Vérifiez et corrigez avant de générer les bons.</p>
  <table class="mt"><thead><tr><th>Jour</th><th>Parfum (planning)</th><th>Recette associée</th><th>Statut</th></tr></thead>
  <tbody id="mappingBody"></tbody></table>
  <div style="margin-top:14px;"><button class="btn btn-p" onclick="genererCommandes()">📋 Générer les bons de commande</button></div>
</div>

<div class="cs" id="cs">
  <div class="stitle" id="stitle"></div>
  <div class="ssub" id="ssub"></div>
  <div class="pr" id="pr"></div>
  <div class="tnav" id="tnav"></div>
  <div class="abar"><button class="btn btn-o" onclick="window.print()">🖨️ Imprimer</button><button class="btn btn-s" onclick="copierTout()">📋 Copier tout</button></div>
  <div id="tc"></div>
</div>

</main>
<div id="toast"></div>

<script>
const SHEET_ID='1IJ_I-JxafJpIF9H2pInXaET-IQw0KrTialE94rL2hoI';

// GIDs des onglets — tous vérifiés directement depuis Google Sheets
const ONGLETS=[
  {g:"784016522",n:"25/12/23"},{g:"915093093",n:"15/12/25"},{g:"1564905807",n:"08/12/25"},
  {g:"745810776",n:"02/12/25"},{g:"750359579",n:"24/11/25"},{g:"1492293636",n:"17/11/25"},
  {g:"658682002",n:"11/11/25"},{g:"1470174700",n:"03/11/25"},{g:"1868118366",n:"27/10/25"},
  {g:"475155385",n:"20/10/25"},{g:"1781313425",n:"13/10/25"},{g:"849636766",n:"06/10/25"},
  {g:"822288033",n:"29/09/25"},{g:"508272418",n:"22/09/25"},{g:"535491550",n:"15/09/25"},
  {g:"1195585331",n:"08/09/25"},{g:"839993531",n:"01/09/25"},{g:"1835349786",n:"25/08/25"},
  {g:"998167865",n:"18/08/25"},{g:"1305254368",n:"11/08/25"},{g:"2020692799",n:"04/08/25"},
  {g:"1281957263",n:"28/07/25"},{g:"2145923261",n:"22/07/25"},{g:"1893182498",n:"14/07/25"},
  {g:"699449302",n:"07/07/25"},{g:"306207613",n:"30/06/25"},{g:"304318694",n:"23/06/25"},
  {g:"1451338602",n:"16/06/25"},{g:"2006264587",n:"9/06/25"},{g:"1740974321",n:"02/06/25"},
  {g:"445484817",n:"19/05/25"},{g:"430806259",n:"12/05/25"},{g:"1003675794",n:"05/05/25"},
  {g:"1302133986",n:"28/04/25"},{g:"1886773834",n:"21/04/25"},{g:"1166307452",n:"13/04/26"},
  {g:"2062644190",n:"06/04/25"},{g:"1942480222",n:"30/03/26"},{g:"1855293143",n:"23/03/26"},
  {g:"1213026894",n:"16/03/26"},{g:"1561179333",n:"10/03/25"},{g:"2011408948",n:"02/03/26"},
  {g:"1575689539",n:"23/02/26"},{g:"375230417",n:"16/02/26"},{g:"883980928",n:"03/02/25"}
];

let S={recettes:[],ingredients:[],fournisseurs:[],planning:[],mapping:{},semaine:''};

// ── Utilitaires ──
function ss(msg,type='l'){
  const b=document.getElementById('statusBar');
  b.className='sb show sb-'+(type==='l'?'l':type==='ok'?'ok':'err');
  b.innerHTML=type==='l'?`<div class="spin"></div><span>${msg}</span>`:`<span>${type==='ok'?'✅':'❌'}</span><span>${msg}</span>`;
}
function hs(){document.getElementById('statusBar').className='sb'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim()}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}
function fqte(n){if(!n)return'0';if(Number.isInteger(n))return''+n;return n.toFixed(n<1?3:n<10?2:1).replace(/\.?0+$/,'')}
function pdate(nom){const m=nom.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);if(!m)return null;let y=m[3]?parseInt(m[3]):new Date().getFullYear();if(y<100)y+=2000;return new Date(y,parseInt(m[2])-1,parseInt(m[1]))}

// ── Config ──
function chargerConfig(){
  const c=JSON.parse(localStorage.getItem('tc_cfg')||'{}');
  if(c.url)document.getElementById('supabaseUrl').value=c.url;
  if(c.key)document.getElementById('supabaseKey').value=c.key;
  if(c.mapping)S.mapping=c.mapping;
  if(Object.keys(c).length)document.getElementById('saveConfig').checked=true;
}
function saveConfig(){
  if(!document.getElementById('saveConfig').checked)return;
  localStorage.setItem('tc_cfg',JSON.stringify({url:document.getElementById('supabaseUrl').value.trim(),key:document.getElementById('supabaseKey').value.trim(),mapping:S.mapping}));
}

// ── Sélecteur semaines ──
function initSelect(){
  const sorted=[...ONGLETS].sort((a,b)=>{const da=pdate(a.n),db=pdate(b.n);return(!da||!db)?0:db-da});
  const sel=document.getElementById('semaineSelect');
  sel.innerHTML='<option value="">— Choisir une semaine —</option>';
  const today=new Date();let best=null,bd=Infinity;
  for(const o of sorted){
    const opt=document.createElement('option');opt.value=o.g;opt.textContent=o.n;sel.appendChild(opt);
    const d=pdate(o.n);if(d){const diff=Math.abs(d-today);if(diff<bd){bd=diff;best=o.g}}
  }
  // Option pour saisie manuelle
  const optM=document.createElement('option');optM.value='__manuel__';optM.textContent='✏️ Autre semaine (saisir le GID)…';sel.appendChild(optM);
  if(best)sel.value=best;
}

function toggleGidManuel(){
  const v=document.getElementById('semaineSelect').value;
  document.getElementById('gidManuelDiv').style.display=v==='__manuel__'?'block':'none';
}

// ── Chargement ──
async function lancerChargement(){
  const url=document.getElementById('supabaseUrl').value.trim();
  const key=document.getElementById('supabaseKey').value.trim();
  let gid=document.getElementById('semaineSelect').value;
  if(gid==='__manuel__'){gid=document.getElementById('gidManuel')?.value?.trim()||'';if(!gid){ss('Veuillez saisir le GID de l\'onglet.','err');return}}
  if(!url||!key){ss('Renseignez URL Supabase et clé.','err');return}
  if(!gid){ss('Choisissez une semaine.','err');return}
  try{
    ss('Chargement Supabase…');await chargerSupa(url,key);
    ss('Lecture du planning…');await chargerPlanning(gid);
    saveConfig();
    const jours=[...new Set(S.planning.map(p=>p.jour))];
    ss(`✓ ${S.recettes.length} recettes · ${S.planning.length} production(s) : ${jours.map(cap).join(', ')}`,'ok');
    afficherMapping();
  }catch(e){ss('Erreur : '+e.message,'err');console.error(e)}
}

async function supaGet(url,key,table,q=''){
  const r=await fetch(`${url}/rest/v1/${table}?${q}`,{headers:{'apikey':key,'Authorization':'Bearer '+key}});
  if(!r.ok)throw new Error(`Supabase ${table}: ${r.status}`);
  return r.json();
}

async function chargerSupa(url,key){
  const base=url.replace(/\/$/,'');
  const[rec,ing,fou]=await Promise.all([supaGet(base,key,'recettes','order=nom&select=*'),supaGet(base,key,'ingredients','order=nom_recette&select=*'),supaGet(base,key,'fournisseurs','order=nom&select=*')]);
  S.recettes=rec.map(r=>({id:r.id,nom:r.nom||r.nom_recette||'',categorie:r.categorie||'',poudres:r.poudres||[],liquides:r.liquides||[],ingredients:r.ingredients||[],toppings:r.toppings||[]}));
  S.ingredients=ing.map(i=>({id:i.id,nomRecette:i.nom_recette||i.nomRecette||'',nomEtiquette:i.nom_etiquette||i.nomEtiquette||'',fournisseurId:i.fournisseur_id||i.fournisseurId||'',unite:i.unite||'kg',bio:i.bio||false}));
  S.fournisseurs=fou.map(f=>({id:f.id,nom:f.nom||'',contact:f.contact||'',jourCommande:f.jour_commande||f.jourCommande||'',jourLivraison:f.jour_livraison||f.jourLivraison||''}));
}

function parseCSV(csv){
  const rows=[];let cur='',inQ=false,cols=[];
  for(let i=0;i<csv.length;i++){const ch=csv[i],nx=csv[i+1];
    if(ch==='"'){if(inQ&&nx==='"'){cur+='"';i++}else inQ=!inQ}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur=''}
    else if((ch==='\n'||ch==='\r')&&!inQ){if(ch==='\r'&&nx==='\n')i++;cols.push(cur.trim());rows.push(cols);cols=[];cur=''}
    else cur+=ch}
  if(cur||cols.length){cols.push(cur.trim());rows.push(cols)}return rows;
}

async function chargerPlanning(gid){
  const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`);
  if(!r.ok)throw new Error(`Sheet inaccessible (${r.status}) — vérifiez le partage public.`);
  const csv=await r.text();
  const lignes=parseCSV(csv);
  S.planning=[];
  const JOURS=['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
  let jour='',date='';
  for(const l of lignes.slice(15,70)){
    const A=(l[0]||'').trim(),B=(l[1]||'').trim(),C=(l[2]||'').trim(),D=(l[3]||'').trim(),E=(l[4]||'').trim();
    if(JOURS.includes(A.toLowerCase())){jour=A.toLowerCase();date=''}
    else if(A&&/^\d{1,2}[\/\-]\d{1,2}/.test(A))date=A;
    if(B.toUpperCase()==='OFF')continue;
    if(jour&&C&&C.toLowerCase()!=='parfums'){
      let p=C,mx=1;const mX=p.match(/\s+[Xx]\s*(\d+)$/);
      if(mX){mx=parseInt(mX[1]);p=p.replace(/\s+[Xx]\s*\d+$/,'').trim()}
      S.planning.push({jour,date,parfum:p,mixCount:mx,qteOutput:D,sgl:E});
    }
  }
  const sel=document.getElementById('semaineSelect');
  S.semaine=sel.options[sel.selectedIndex]?.text||'';
}

// ── Mapping ──
function fuzzy(parfum){
  const nk=norm(parfum),mots=nk.split(/\s+/).filter(m=>m.length>2);
  for(const r of S.recettes)if(norm(r.nom)===nk)return r.id;
  for(const r of S.recettes){const nr=norm(r.nom);if(mots.length>0&&mots.every(m=>nr.includes(m)))return r.id}
  for(const r of S.recettes){const mr=norm(r.nom).split(/\s+/).filter(m=>m.length>2);if(mr.length>0&&mr.every(m=>nk.includes(m)))return r.id}
  let best=0,bid=null;
  for(const r of S.recettes){const sc=mots.filter(m=>norm(r.nom).includes(m)).length;if(sc>best){best=sc;bid=r.id}}
  if(best>=1&&mots.length<=2)return bid;return null;
}

function afficherMapping(){
  const pu=[...new Map(S.planning.map(p=>[p.parfum,p])).values()];
  for(const p of pu){const k=norm(p.parfum);if(!S.mapping[k]){const m=fuzzy(p.parfum);if(m)S.mapping[k]=m}}
  const tb=document.getElementById('mappingBody');tb.innerHTML='';
  for(const p of pu){
    const k=norm(p.parfum),rid=S.mapping[k]||'';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="badge bj-${p.jour}">${cap(p.jour)}</span></td>
    <td><strong>${p.parfum}</strong>${p.mixCount>1?` <em style="color:var(--gris);font-size:11px;">×${p.mixCount}</em>`:''}</td>
    <td><select onchange="S.mapping['${k}']=this.value;saveConfig()"><option value="">— Non associé —</option>
    ${S.recettes.map(r=>`<option value="${r.id}"${r.id===rid?' selected':''}>${r.nom}</option>`).join('')}</select></td>
    <td><span class="badge ${rid?'b-ok':'b-err'}">${rid?'✓ OK':'⚠ Vérifier'}</span></td>`;
    tb.appendChild(tr);
  }
  document.getElementById('mappingCard').classList.add('show');
}

// ── Génération ──
function genererCommandes(){
  const bMap={};
  for(const prod of S.planning){
    const rid=S.mapping[norm(prod.parfum)];if(!rid)continue;
    const rec=S.recettes.find(r=>r.id===rid);if(!rec)continue;
    const mx=prod.mixCount||1;
    for(const l of [...(rec.poudres||[]),...(rec.liquides||[]),...(rec.ingredients||[]),...(rec.toppings||[])]){
      const iid=l.ingredientId||l.ingredient_id;if(!iid)continue;
      const p=parseFloat(l.poids)||0;
      if(!bMap[iid])bMap[iid]={q:0,u:l.unite||'g',recs:new Set()};
      bMap[iid].q+=p*mx;bMap[iid].recs.add(prod.parfum);
    }
  }
  const parFour={};const stock=[];
  for(const[iid,b] of Object.entries(bMap)){
    const ing=S.ingredients.find(i=>i.id===iid);if(!ing)continue;
    let q=b.q,u=b.u;
    if(u==='g'&&q>=1000){q/=1000;u='kg'}if(u==='ml'&&q>=1000){q/=1000;u='L'}
    const item={ing,qte:parseFloat(q.toFixed(3)),u,recs:[...b.recs]};
    const fou=S.fournisseurs.find(f=>f.id===ing.fournisseurId);
    if(fou&&fou.jourCommande){if(!parFour[fou.id])parFour[fou.id]={fou,lignes:[]};parFour[fou.id].lignes.push(item)}
    else stock.push({item,fn:fou?.nom||'Non défini'});
  }
  afficherResultats(parFour,stock);
}

function afficherResultats(parFour,stock){
  // Planning récap
  const ORDRE=['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
  const pj={};for(const p of S.planning){if(!pj[p.jour])pj[p.jour]=[];pj[p.jour].push(p)}
  let rh='<h3>📅 Planning de la semaine</h3>';
  for(const j of ORDRE){if(!pj[j])continue;
    rh+=`<div class="pj"><span class="jl">${cap(j)}</span><div>${pj[j].map(p=>{const ok=!!S.mapping[norm(p.parfum)];return`<span class="tp ${ok?'ok':'nok'}">${ok?'✓':'⚠'} ${p.parfum}${p.mixCount>1?` ×${p.mixCount}`:''}</span>`}).join('')}</div></div>`}
  document.getElementById('pr').innerHTML=rh;

  const tnav=document.getElementById('tnav'),tc=document.getElementById('tc');
  tnav.innerHTML='';tc.innerHTML='';
  const tabs=[];

  // Bons fournisseurs avec jour commande
  for(const fou of S.fournisseurs.filter(f=>parFour[f.id]))
    tabs.push({id:`f_${fou.id}`,label:fou.nom,icon:'📦',html:bonHtml(parFour[fou.id])});

  // Stock commun
  if(stock.length)tabs.push({id:'stock',label:'En stock / Divers',icon:'🏪',html:stockHtml(stock)});

  // Emails
  const eh=emailsHtml(parFour);
  if(eh)tabs.push({id:'emails',label:'Emails fournisseurs',icon:'✉️',html:eh});

  tabs.forEach((tab,i)=>{
    const btn=document.createElement('button');
    btn.className='tbtn'+(i===0?' active':'');btn.textContent=`${tab.icon} ${tab.label}`;
    btn.onclick=()=>activerTab(tab.id);tnav.appendChild(btn);
    const panel=document.createElement('div');
    panel.className='tpanel'+(i===0?' active':'');panel.id=`p_${tab.id}`;panel.innerHTML=tab.html;
    tc.appendChild(panel);
  });

  const cs=document.getElementById('cs');cs.classList.add('show');
  document.getElementById('stitle').textContent=`Bons de commande — Semaine ${S.semaine}`;
  document.getElementById('ssub').textContent=`${S.planning.length} productions · ${Object.keys(parFour).length} fournisseurs · ${new Date().toLocaleDateString('fr-FR')}`;
  cs.scrollIntoView({behavior:'smooth'});
  toast(`${tabs.length} sections générées ✓`);
}

function activerTab(id){
  document.querySelectorAll('.tbtn').forEach((b,i)=>{const panels=document.querySelectorAll('.tpanel');const pid=panels[i]?.id?.replace('p_','');b.classList.toggle('active',pid===id)});
  document.querySelectorAll('.tpanel').forEach(p=>p.classList.toggle('active',p.id===`p_${id}`));
}

function bonHtml({fou,lignes}){
  const rows=lignes.map(l=>`<tr><td><div style="font-weight:500">${l.ing.nomRecette}</div><div style="font-size:11px;color:var(--gris)">${l.ing.nomEtiquette||''} ${l.ing.bio?'🌿':''}</div></td><td><span class="qte">${fqte(l.qte)} ${l.u}</span></td><td>${l.recs.map(r=>`<span class="tr">${r}</span>`).join('')}</td></tr>`).join('');
  const dl=JSON.stringify(lignes.map(l=>({n:l.ing.nomRecette,q:fqte(l.qte),u:l.u}))).replace(/'/g,'&#39;');
  return`<div class="bc" data-fn="${fou.nom}" data-dl='${dl}'><div class="bch"><div><div class="fn">${fou.nom}</div><div class="fc">${fou.contact||''}</div></div><div class="ji">${fou.jourCommande?`<div>📤 Commande : <strong>${cap(fou.jourCommande)}</strong></div>`:''} ${fou.jourLivraison?`<div>📦 Livraison : <strong>${cap(fou.jourLivraison)}</strong></div>`:''}</div></div><table class="btab"><thead><tr><th>Ingrédient</th><th>Quantité</th><th>Pour les recettes</th></tr></thead><tbody>${rows}</tbody></table><div class="bf"><button class="btn btn-s btn-sm" onclick="copierBon(this)">📋 Copier ce bon</button></div></div>`;
}

function stockHtml(stock){
  const rows=stock.map(({item:l,fn})=>`<tr><td><div style="font-weight:500">${l.ing.nomRecette}</div><div style="font-size:11px;color:var(--gris)">${l.ing.nomEtiquette||''} ${l.ing.bio?'🌿':''}</div></td><td><span class="qte">${fqte(l.qte)} ${l.u}</span></td><td style="color:var(--gris);font-size:12px">${fn}</td><td>${l.recs.map(r=>`<span class="tr">${r}</span>`).join('')}</td></tr>`).join('');
  return`<div class="card"><h2>🏪 Ingrédients en stock / sans commande programmée</h2><p style="font-size:13px;color:var(--gris);margin-bottom:12px">Ces ingrédients n'ont pas de jour de commande défini — généralement en stock.</p><table class="btab"><thead><tr><th>Ingrédient</th><th>Besoin</th><th>Fournisseur</th><th>Pour les recettes</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function emailsHtml(parFour){
  const cibles=S.fournisseurs.filter(f=>parFour[f.id]||['dipsa','gamme','chef'].some(k=>f.nom.toLowerCase().includes(k)));
  if(!cibles.length)return'';
  const dates=[...new Set(S.planning.map(p=>p.date).filter(Boolean))];
  const periode=dates.length>=2?`du ${dates[0]} au ${dates[dates.length-1]}`:dates[0]||S.semaine;
  return cibles.map(fou=>{
    const email=fou.contact?.match(/[\w.+-]+@[\w.-]+\.\w+/)?.[0]||'';
    const lignes=parFour[fou.id]?.lignes||[];
    const liste=lignes.length?lignes.map(l=>`  - ${l.ing.nomRecette} : ${fqte(l.qte)} ${l.u}`).join('\n'):'  (voir bon de commande)';
    const corps=`Bonjour,\n\nVeuillez trouver ci-dessous notre commande pour la semaine ${S.semaine} (${periode}) :\n\n${liste}\n\nMerci de confirmer la réception et de nous indiquer la date de livraison prévue.\n\nCordialement,\nLa Tropicale Glacier`;
    return`<div class="ec"><div class="ech"><div class="et">✉️ ${fou.nom}</div><div style="font-size:11px;opacity:.7">${fou.jourCommande?`À envoyer le : ${cap(fou.jourCommande)}`:''}</div></div>
    <div class="ef"><div class="efl"><label>À</label><div class="v"><input type="text" id="eto_${fou.id}" value="${email}" placeholder="email@fournisseur.fr" style="max-width:400px"></div></div>
    <div class="efl"><label>Objet</label><div class="v"><input type="text" id="esub_${fou.id}" value="Commande La Tropicale Glacier — semaine ${S.semaine}" style="max-width:500px"></div></div></div>
    <div class="eb"><textarea id="ebod_${fou.id}">${corps}</textarea></div>
    <div class="ef2"><button class="btn btn-s btn-sm" onclick="copierEmail('${fou.id}')">📋 Copier</button><button class="btn btn-p btn-sm" onclick="ouvrirEmail('${fou.id}')">📨 Ouvrir dans la messagerie</button></div></div>`;
  }).join('');
}

function copierBon(btn){
  const d=btn.closest('.bc');
  const fn=d.dataset.fn;const ll=JSON.parse(d.dataset.dl||'[]');
  let t=`BON DE COMMANDE — ${fn}\nSemaine ${S.semaine}\n${'─'.repeat(40)}\n`;
  for(const l of ll)t+=`${l.n.padEnd(28)} ${(l.q+' '+l.u).padStart(10)}\n`;
  navigator.clipboard.writeText(t).then(()=>toast('Bon copié !'));
}
function copierEmail(fid){
  const to=document.getElementById(`eto_${fid}`)?.value||'';
  const sb=document.getElementById(`esub_${fid}`)?.value||'';
  const bd=document.getElementById(`ebod_${fid}`)?.value||'';
  navigator.clipboard.writeText(`À : ${to}\nObjet : ${sb}\n\n${bd}`).then(()=>toast('Email copié !'));
}
function ouvrirEmail(fid){
  const to=encodeURIComponent(document.getElementById(`eto_${fid}`)?.value||'');
  const sb=encodeURIComponent(document.getElementById(`esub_${fid}`)?.value||'');
  const bd=encodeURIComponent(document.getElementById(`ebod_${fid}`)?.value||'');
  window.location.href=`mailto:${to}?subject=${sb}&body=${bd}`;
}
function copierTout(){
  const bons=document.querySelectorAll('.bc');
  let t=`BONS DE COMMANDE — La Tropicale Glacier\nSemaine ${S.semaine}\n${'═'.repeat(50)}\n\n`;
  for(const d of bons){const ll=JSON.parse(d.dataset.dl||'[]');t+=`▶ ${d.dataset.fn}\n${'─'.repeat(40)}\n`;for(const l of ll)t+=`  ${l.n.padEnd(28)} ${(l.q+' '+l.u).padStart(10)}\n`;t+='\n'}
  navigator.clipboard.writeText(t).then(()=>toast('Tout copié !'));
}

window.addEventListener('DOMContentLoaded',()=>{chargerConfig();initSelect()});
</script>
